<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Sunday School{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #FAF7F2;
      --ink:     #1A1714;
      --muted:   #7A736B;
      --border:  #E2DDD7;
      --gold:    #C9922A;
      --gold-lt: #F5ECD8;
      --green:   #2E6B4F;
      --green-lt:#E4F0EB;
      --red:     #B94040;
      --red-lt:  #F7EAEA;
      --radius:  14px;
      --shadow:  0 2px 12px rgba(26,23,20,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      padding-bottom: 48px;
    }

    header {
      background: var(--ink);
      color: var(--cream);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      letter-spacing: 0.01em;
    }

    header .logo span {
      color: var(--gold);
    }

    header nav a {
      color: var(--cream);
      text-decoration: none;
      font-size: 13px;
      opacity: 0.7;
      margin-left: 20px;
      transition: opacity 0.2s;
    }
    header nav a:hover { opacity: 1; }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 32px 20px 0;
    }

    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      margin-bottom: 6px;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 24px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      text-decoration: none;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--ink);
      color: var(--cream);
    }
    .btn-primary:hover { opacity: 0.88; }

    .btn-success {
      background: var(--green);
      color: #fff;
      width: 100%;
      font-size: 16px;
      padding: 15px;
    }
    .btn-success:hover { opacity: 0.9; }

    .btn-gold {
      background: var(--gold);
      color: #fff;
      width: 100%;
      padding: 15px;
      font-size: 16px;
    }
    .btn-gold:hover { opacity: 0.9; }

    select, input[type="text"] {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--ink);
      background: #fff;
      appearance: none;
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus, input[type="text"]:focus {
      border-color: var(--gold);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink);
      color: var(--cream);
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); }
    .toast.error   { background: var(--red); }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>
  <header>
    <div class="logo">Madares<span>2a7ad</span></div>
    <nav>
      <a href="/">Home</a>
      <a href="/manage">New Kid</a>
    </nav>
  </header>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <div class="toast" id="toast"></div>

  <script>
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type;
      setTimeout(() => t.classList.add('show'), 10);
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
  {% block extra_script %}{% endblock %}
</body>
</html>
